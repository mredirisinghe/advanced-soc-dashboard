<!DOCTYPE html>
<html>

<head>

<title>Professional SOC</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>🛡️ SOC Console</h2>

<ul>

<li>Dashboard</li>

<li>Incidents</li>

<li>Threat Intel</li>

<li>Analytics</li>

<li>MITRE ATT&CK</li>

<li>Live Events</li>

</ul>

</div>

<div class="main">

<h1>Professional SOC Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Alerts</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Critical</h3>
<p id="critical">0</p>
</div>

<div class="card">
<h3>High</h3>
<p id="high">0</p>
</div>

<div class="card">
<h3>Medium</h3>
<p id="medium">0</p>
</div>

</div>

<div class="chart-box">

<h2>Attack Analytics</h2>

<canvas id="attackChart"></canvas>

</div>

<div class="table-box">

<h2>Live Incident Feed</h2>

<table>

<thead>

<tr>

<th>Time</th>

<th>IP</th>

<th>Attack</th>

<th>Severity</th>

<th>MITRE</th>

</tr>

</thead>

<tbody id="incident-body">

</tbody>

</table>

</div>

</div>

<script src="/static/app.js"></script>

<script>

const ctx = document.getElementById('attackChart');

new Chart(ctx, {

    type:'bar',

    data:{

        labels:['SQLi','XSS','Traversal','Command'],

        datasets:[{

            label:'Attacks',

            data:[12,5,9,7]

        }]
    }
});

</script>

</body>

</html>
